<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="js/script.js" defer></script>
    <title>Baskets - Running</title>
</head>
<body>
    <div id="overlay"></div>

    <!-- Menu Pour Mobile -->
    <div id="mobile-menu" class="mobile-main-menu">
      <ul>
        <li><a id="menu-nav" href="index.html">Acceuil</a></li>
        <li><a id="menu-nav" href="Basket.html">BASKETS</a></li>
        <li><a id="menu-nav" href="Vêtements.html">VÊTEMENTS</a></li>
        <li><a id="menu-nav" href="Accessoires.html">ACCESSOIRES</a></li>
        <li><a id="menu-nav" href="signin.html">Connexion</a></li>
        <li><a id="menu-nav" href="signup.html">Inscription</a></li>
      </ul>
    </div>

    <!-- Header et Menu-->
    <header class="main-header">
      <div class="logo">
        <a href="index.html">
          <img src="img/Logo_Crypto.png" alt="RUN Logo" />
        </a>
      </div>
      <nav class="desktop-main-menu">
        <ul>
          <li><a id="menu-nav" href="index.html">Acceuil</a></li>
          <li><a id="menu-nav" href="Basket.html">BASKETS</a></li>
          <li><a id="menu-nav" href="Vêtements.html">VÊTEMENTS</a></li>
          <li><a id="menu-nav" href="Accessoires.html">ACCESSOIRES</a></li>
          <li><a id="menu-nav" href="signin.html">Connexion</a></li>
          <li><a id="menu-nav" href="signup.html">Inscription</a></li>
        </ul>
      </nav>
    </header>

    <!-- Hamburger Menu -->
    <button id="menu-btn" class="hamburger" type="button">
      <span class="hamburger-top"></span>
      <span class="hamburger-middle"></span>
      <span class="hamburger-bottom"></span>
    </button>

    <!-- Section Produits -->
    <section class="products-section">
      <div class="products-container">
        <h1>BASKETS</h1>
        <div class="products-grid">
          
          <!-- Produit 1 -->
          <div class="product-card">
            <div class="product-image">
              <img src="img/nike pegasus.png" alt="Basket 1">
            </div>
            <div class="product-info">
              <h3 class="product-title">Nike Pegasus 41</h3>
              <p class="product-price">139,95 €</p>
            </div>
          </div>

          <!-- Produit 2 -->
          <div class="product-card">
            <div class="product-image">
              <img src="img/adidas ultraboost blanc.png" alt="Basket 2">
            </div>
            <div class="product-info">
              <h3 class="product-title">Adidas Ultraboost</h3>
              <p class="product-price">129,99 €</p>
            </div>
          </div>

          <!-- Produit 3 -->
          <div class="product-card">
            <div class="product-image">
              <img src="img/Ascis Gel-Kayano.png" alt="Basket 3">
            </div>
            <div class="product-info">
              <h3 class="product-title">Ascis Gel-Kayano</h3>
              <p class="product-price">159,99 €</p>
            </div>
          </div>

          <!-- Produit 4 -->
          <div class="product-card">
            <div class="product-image">
              <img src="img/Nike Air Max Impact 4.png" alt="Basket 4">
            </div>
            <div class="product-info">
              <h3 class="product-title">Nike Air Max Impact 4</h3>
              <p class="product-price">69,99 €</p>
            </div>
          </div>

        </div>
      </div>
